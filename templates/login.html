<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Redstone PDM — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a2332;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #1a2332;
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 12px;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .divider {
    height: 3px;
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    border-radius: 2px;
    margin: 0 auto 28px;
    width: 48px;
  }
  h2 {
    font-size: 18px;
    color: #1a2332;
    margin-bottom: 6px;
    font-weight: 600;
  }
  p.sub {
    font-size: 13px;
    color: #7f8c8d;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #7f8c8d;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    color: #1a2332;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus { border-color: #c0392b; }
  button {
    width: 100%;
    padding: 15px;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  button:active { background: #a93226; }
  .error {
    background: #fdf2f2;
    border: 1px solid #f5c6c6;
    color: #c0392b;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .footer {
    text-align: center;
    font-size: 11px;
    color: #bdc3c7;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">Redstone PDM</div>
    <div class="logo-sub">Field Engineer Portal</div>
  </div>
  <div class="divider"></div>
  <h2>Sign in</h2>
  <p class="sub">Enter your name and password to access your jobs.</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Your Name</label>
    <input type="text" name="name" placeholder="e.g. Ash Everett"
           autocomplete="name" autocapitalize="words" required>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>
    <button type="submit">Sign In →</button>
  </form>
  <div class="footer">Redstone PDM Ltd · Property Development &amp; Maintenance</div>
</div>
</body>
</html>
